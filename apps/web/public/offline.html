<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Launch Agent — Unreachable</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: #1e1b4b;
        color: #e0e7ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
      }
      main {
        max-width: 24rem;
        text-align: center;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
      }
      p {
        color: #a5b4fc;
        line-height: 1.5;
        margin-bottom: 1.5rem;
      }
      button {
        appearance: none;
        border: none;
        border-radius: 0.5rem;
        background: #4f46e5;
        color: #eef2ff;
        font-size: 1rem;
        font-weight: 500;
        padding: 0.75rem 1.5rem;
        cursor: pointer;
      }
      button:active {
        background: #4338ca;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Can't reach Launch Agent</h1>
      <p>
        This app only works while your device is connected to Tailscale. Check
        that Tailscale is running, then try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </main>
  </body>
</html>
